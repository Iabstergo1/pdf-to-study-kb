[pytest]
# Test tiers — see pipeline-workspace/reports/test-audit-2026-06-25.md
# File→marker mapping lives in tests/conftest.py (keeps contract test files untouched).
addopts = --strict-markers
markers =
    fast: cheap unit/contract tests safe for frequent local runs
    cli: tests that invoke the public command-line surface
    slow: high-cost deterministic tests, usually subprocess or full workflow
    skill: tests for .agents/.claude skill protocol and dual-tree parity
    realbook: tests/scripts needing real source files, MinerU models, or long external workflows
